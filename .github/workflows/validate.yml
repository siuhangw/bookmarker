name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-yaml:
    name: Validate bookmarks.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Validate schema
        run: python3 scripts/sync_bookmarks.py --validate-only --yaml data/bookmarks.yaml

  python:
    name: Python lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check scripts/ tests/

      - name: Pytest
        run: pytest

  shell:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./scripts"
