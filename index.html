<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markly — Bookmark Showcase</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/sidebar.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/modal.css" />
</head>
<body data-theme="light">

  <!-- Loading Screen -->
  <div id="loading" class="loading-screen">
    <div class="loading-icon" style="width:40px;height:40px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;">
      <i data-lucide="bookmark" style="width:18px;height:18px;color:#fff;"></i>
    </div>
    <div style="display:flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:14px;">
      <i data-lucide="loader-2" class="loading-spinner" style="width:16px;height:16px;"></i>
      Loading bookmarks…
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app" style="display:none;">

    <!-- Overlay -->
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

    <!-- Bookmark Modal -->
    <div id="bookmarkModal" class="modal-overlay" onclick="closeModal()">
      <div class="modal-panel" onclick="event.stopPropagation()">
        <div id="modalContent"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar sb">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <i data-lucide="bookmark" style="width:15px;height:15px;color:#fff;"></i>
        </div>
        <div style="flex:1;">
          <span id="siteName" class="sidebar-title">Markly</span>
          <span class="sidebar-subtitle">Showcase</span>
        </div>
        <button class="sidebar-close" onclick="closeSidebar()">
          <i data-lucide="x" style="width:18px;height:18px;"></i>
        </button>
      </div>
      <nav class="sidebar-nav sb" id="sidebarNav"></nav>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="header">
        <button class="header-btn" id="menuBtn" onclick="toggleSidebar()"></button>
        <div class="search-wrap">
          <i data-lucide="search" style="width:15px;height:15px;color:var(--text-dim);flex-shrink:0;"></i>
          <input class="search-input" id="searchInput" placeholder="Search…" oninput="onSearch()" />
          <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">
            <i data-lucide="x" style="width:14px;height:14px;"></i>
          </button>
        </div>
        <div class="spacer"></div>
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')">
            <i data-lucide="grid-3x3" style="width:14px;height:14px;"></i>
          </button>
          <button class="view-btn" id="listBtn" onclick="setView('list')">
            <i data-lucide="list" style="width:14px;height:14px;"></i>
          </button>
        </div>
        <div class="sort-toggle">
          <button class="sort-btn active" id="sortDefault" onclick="setSort('default')" title="Default order">
            <i data-lucide="arrow-up-down" style="width:14px;height:14px;"></i>
          </button>
          <button class="sort-btn" id="sortAlpha" onclick="setSort('alpha')" title="A → Z">
            <i data-lucide="a-z" style="width:14px;height:14px;"></i>
          </button>
          <button class="sort-btn" id="sortDate" onclick="setSort('date')" title="Newest first">
            <i data-lucide="calendar" style="width:14px;height:14px;"></i>
          </button>
        </div>
        <button class="theme-btn" onclick="toggleTheme()">
          <i id="themeIcon" data-lucide="moon" style="width:15px;height:15px;"></i>
        </button>
        <a href="https://github.com/siuhangw/bookmarker" target="_blank" rel="noopener noreferrer" class="github-btn" aria-label="View on GitHub">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.373 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.387.6.111.82-.26.82-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.51 11.51 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .32.192.694.801.576C20.565 21.796 24 17.299 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>
        <span class="item-count" id="itemCount"></span>
      </header>
      <div class="content sb" id="content"></div>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/actions.js"></script>
</body>
</html>
