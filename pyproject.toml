[tool.ruff]
line-length = 110
target-version = "py310"
extend-exclude = ["data", "bookmarks-processed", "bookmarks-inbox"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM"]
ignore = ["E501"]  # handled by formatter / long f-strings in CLI

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
